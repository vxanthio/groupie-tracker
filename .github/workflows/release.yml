name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          go build -o bin/groupie-tracker-linux-amd64 ./cmd
          GOOS=darwin  GOARCH=amd64 go build -o bin/groupie-tracker-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o bin/groupie-tracker-windows-amd64.exe ./cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/groupie-tracker-*
